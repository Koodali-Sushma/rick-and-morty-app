<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Rick and Morty Character Log</title>
    <link rel="stylesheet" href="./styles.css" />

    <script type="module" src="./index.js"></script>
  </head>
  <body>
    <h1 class="title">Rick and More</h1>
    <main class="app-layout">
        <div class="search-bar-container" data-js="search-bar-container"></div>
        <nav class="navigation" data-js="navigation"></nav>
      <ul class="card-container" data-js="card-container">
        <li class="card">
          <div class="card__image-container">
            <img
              class="card__image"
              src="https://rickandmortyapi.com/api/character/avatar/1.jpeg"
              alt="Rick Sanchez"
            />
            <div class="card__image-gradient"></div>
          </div>
          <div class="card__content"></div>
        </li>
      </ul>
    </main>
  </body>
</html>
